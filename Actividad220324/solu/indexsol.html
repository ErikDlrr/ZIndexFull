<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Películas</title>
    <link rel="stylesheet" href="stylesolu.css">
</head>

<body>
    <div class="inicio">
        <h1>Netflix</h1>
        <h2>¡Bienvenido a Netflix!</h2>
        <p>Disfruta de las mejores películas en nuestra plataforma.</p>
        <p>Selecciona una película para ver más detalles.</p>
    </div>
    <div class="catalog">
        <div class="movie" id="movie1">
            <img src="img/movie1.jpg" alt="Póster de la Película 1">
        </div>
        <div class="movie" id="movie2">
            <img src="img/movie2.jpg" alt="Póster de la Película 2">
        </div>
        <div class="movie" id="movie3">
            <img src="img/movie3.jpg" alt="Póster de la Película 3">
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
